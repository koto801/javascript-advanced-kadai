<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイピングゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>タイピングゲーム</h1>

  <div id="timer-area">
    残り時間: <span id="timer">10</span> 秒
  </div>

  <div id="typing-area">
    <p id="word-display">スタートボタンを押してください</p>
  </div>

  <div id="input-area">
    <input type="text" id="type-input" placeholder="ここに入力" disabled>
  </div>

  <div id="score-area">
    スコア: <span id="score">0</span>
  </div>

  <button id="start-btn">スタート</button>

  <script src="main.js"></script>
</body>
</html>
