<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイピングゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>⌨️ タイピングゲーム</h1>
    </header>

    <!-- スタート画面 -->
    <div id="start-screen" class="screen active">
      <div class="card">
        <h2>ようこそ！</h2>
        <p>表示された単語をできるだけ速く正確に入力しましょう。</p>
        <div class="info-grid">
          <div class="info-item">
            <span class="icon">⏱</span>
            <span>制限時間: 60秒</span>
          </div>
          <div class="info-item">
            <span class="icon">🎯</span>
            <span>正確に入力してスコアを稼ごう</span>
          </div>
        </div>
        <button id="start-btn" class="btn btn-primary">ゲームスタート</button>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <div id="game-screen" class="screen">
      <div class="hud">
        <div class="hud-item">
          <span class="hud-label">スコア</span>
          <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-item timer-item">
          <span class="hud-label">残り時間</span>
          <span id="timer" class="hud-value">60</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">正解数</span>
          <span id="correct-count" class="hud-value">0</span>
        </div>
      </div>

      <div class="word-display">
        <div id="current-word" class="word"></div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="typing-input"
          class="typing-input"
          placeholder="ここに入力..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        >
      </div>

      <div id="feedback" class="feedback"></div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" class="screen">
      <div class="card">
        <h2>ゲーム終了！</h2>
        <div class="result-grid">
          <div class="result-item">
            <span class="result-label">最終スコア</span>
            <span id="final-score" class="result-value highlight">0</span>
          </div>
          <div class="result-item">
            <span class="result-label">正解数</span>
            <span id="final-correct" class="result-value">0</span>
          </div>
          <div class="result-item">
            <span class="result-label">ミス数</span>
            <span id="final-miss" class="result-value">0</span>
          </div>
          <div class="result-item">
            <span class="result-label">正答率</span>
            <span id="final-accuracy" class="result-value">0%</span>
          </div>
        </div>
        <div id="rank-message" class="rank-message"></div>
        <button id="retry-btn" class="btn btn-primary">もう一度プレイ</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
